<!DOCTYPE html>
<html>

<head>

<title>Issues</title>

<!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-gray-100">

<nav class="bg-white shadow p-4 flex justify-between items-center">

<div class="flex items-center gap-3">

<img src="assets/github-logo.png" class="w-8">

<h1 class="text-xl font-bold">GitHub Issues Tracker</h1>
</div>
<div class="flex gap-2">

<input id="searchInput" placeholder="Search issues" class="border p-2 rounded"/>
<button id="searchBtn" class="bg-indigo-600 text-white px-4 py-2 rounded"> Search </button>

</div> 
</nav>

<div class="max-w-6xl mx-auto p-6">

<div class="flex gap-4 mb-6">

<button class="tab bg-indigo-600 text-white px-4 py-2 rounded" data-status="all">All </button>

<button class="tab border px-4 py-2 rounded" data-status="open">Open</button>

<button class="tab border px-4 py-2 rounded" data-status="closed">Closed</button>
 </div>

<div id="issuesContainer" class="grid md:grid-cols-4 gap-6"></div>

</div>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
