<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker Login</title>

     <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-10 rounded-xl shadow-md w-[400px]">

<div class="text-center">

<img src="assets/github-logo.png" class="w-16 mx-auto mb-4">

<h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>

<p class="text-gray-600 mb-8">Sign in to manage your issues</p>

</div>

<form id="loginForm" class="space-y-4">

<div>

<label class="text-sm font-medium">Username</label>

<input
id="username"
type="text"
placeholder="username"
class="w-full border rounded p-2"/>

<p class="text-blue-500 text-xs">Default: admin</p>

</div>

<div>

<label class="text-sm font-medium">Password</label>

<input
id="password"
type="password"
placeholder="Enter Password"
class="w-full border rounded p-2"/> <p class="text-blue-500 text-xs">Default: admin123</p>
</div>
<button class="w-full bg-indigo-600 text-white py-2 rounded-lg">Sign In</button>
</form>
</div>
<script src="./js/login.js"></script>

</body>
</html>
